services:

  # ---------------------------------------------------------------------------
  # MySQL — remove if using Postgres or another DB
  # ---------------------------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: ${COMPOSE_PROJECT_NAME:-app}_mysql
    restart: unless-stopped
    network_mode: host
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS:-password}
      MYSQL_DATABASE: ${DB_NAME:-myapp}
      MYSQL_TCP_PORT: ${DB_PORT:-3306}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${DB_PASS:-password}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redis — remove if not using queues or caching
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-app}_redis
    restart: unless-stopped
    network_mode: host
    command: redis-server --port ${REDIS_PORT:-6379}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "${REDIS_PORT:-6379}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ---------------------------------------------------------------------------
  # NestJS backend — 2GB memory limit for load testing visibility
  # ---------------------------------------------------------------------------
  backend:
    build: ./backend
    container_name: ${COMPOSE_PROJECT_NAME:-app}_backend
    restart: unless-stopped
    network_mode: host
    environment:
      PORT: ${PORT:-9002}
      NODE_ENV: production
      DB_HOST: ${DB_HOST:-localhost}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-root}
      DB_PASS: ${DB_PASS:-password}
      DB_NAME: ${DB_NAME:-myapp}
      REDIS_HOST: ${REDIS_HOST:-localhost}
      REDIS_PORT: ${REDIS_PORT:-6379}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2g

  # ---------------------------------------------------------------------------
  # cAdvisor — container CPU / memory metrics for Prometheus
  # ---------------------------------------------------------------------------
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: ${COMPOSE_PROJECT_NAME:-app}_cadvisor
    restart: unless-stopped
    network_mode: host
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro

  # ---------------------------------------------------------------------------
  # Prometheus — scrapes /metrics + receives k6 remote write
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: ${COMPOSE_PROJECT_NAME:-app}_prometheus
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.listen-address=:${PROMETHEUS_PORT:-9090}'
      - '--web.enable-remote-write-receiver'
      - '--storage.tsdb.retention.time=7d'

  # ---------------------------------------------------------------------------
  # Grafana — auto-provisioned, zero manual setup
  # Open: http://localhost:3000  login: admin / admin
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: ${COMPOSE_PROJECT_NAME:-app}_grafana
    restart: unless-stopped
    network_mode: host
    environment:
      GF_SERVER_HTTP_PORT: ${GRAFANA_PORT:-3000}
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  mysql-data:
  redis-data:
  grafana-data:
