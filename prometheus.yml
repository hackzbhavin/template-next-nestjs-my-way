global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  # NestJS app — exposes /metrics via @willsoto/nestjs-prometheus
  - job_name: 'nestjs-app'
    static_configs:
      - targets: ['host.docker.internal:9002']  # host machine port

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
