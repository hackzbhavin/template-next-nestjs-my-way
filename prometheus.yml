global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  # NestJS app — exposes /metrics via @willsoto/nestjs-prometheus
  - job_name: 'nestjs-app'
    static_configs:
      - targets: ['localhost:9002']

  # cAdvisor — container CPU / memory / network
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['localhost:8080']

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Uncomment when redis_exporter is running (oliver006/redis_exporter)
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['localhost:9121']

  # Uncomment when mysqld_exporter is running (prometheus/mysqld_exporter)
  # - job_name: 'mysql'
  #   static_configs:
  #     - targets: ['localhost:9104']
